name: CI

# Runs the same checks you'd run by hand — on every pull request, and on every
# push to main — so a change that doesn't type-check, lint, or build can't slip
# through. Free on GitHub-hosted runners.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        # Dummy values so `next build` doesn't fail on the required env vars.
        # The real secrets live in Render, never here. These are read at request
        # time (not build time), so placeholders are safe for the build check.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-time-placeholder-anon-key
          ANTHROPIC_API_KEY: build-time-placeholder
