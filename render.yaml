# XtraUnit Estimator — Render deployment blueprint.
#
# ONE always-on Node web service running the Next.js app. "Always-on" is the
# point: the app's AI jobs (scope generation, pricing) keep running in the
# background for minutes after the request returns, so the server must stay up.
#
# Secrets are set in the Render dashboard (Environment tab), never in git —
# that's what `sync: false` means below: "a human fills this in."
#
# FUTURE: this is a single web instance — correct and cheap for now. The
# background AI jobs live in this one process, so don't scale to multiple
# instances until the planned job-queue + background-worker upgrade. Database
# (Supabase) scales independently by tier. See DEPLOY.md.

services:
  - type: web
    name: xtraunit-estimator
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
