<text x="58" y="638" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start" font-weight="normal">Server Action inserts a scope_runs row -&gt; spawns a fire-and-forget job in the SAME process -&gt; job re-auths with the user&#x27;s token -&gt;</text>
<text x="58" y="655" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start" font-weight="normal">gatherBundle -&gt; Files API (streamed 1 file/time) -&gt; draftScope (Opus, chunked) -&gt; findGaps (Sonnet) -&gt; writes line_items + scope_findings; UI polls progress.</text>
<text x="1130" y="616" font-family="Courier, monospace" font-size="10" fill="#A01C2D" text-anchor="end" font-weight="normal">Known limit: single instance — a job queue + worker is the next infra step.</text>
